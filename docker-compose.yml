# 本地开发 MySQL 服务
# 使用方式：docker-compose up -d
version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: yjedu-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: yjedu_reading_club
      MYSQL_USER: yjedu
      MYSQL_PASSWORD: yjedu123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

volumes:
  mysql_data:
